<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shop List">
  <meta name="theme-color" content="#2d6a4f">
  <title>Shopping List</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Shopping List</h1>
    <button id="clear-done-btn" class="header-btn" aria-label="Clear completed items">Clear Done</button>
  </header>

  <div class="add-bar">
    <input type="text" id="item-input" placeholder="Add an item..." autocomplete="off" autocapitalize="sentences">
    <button id="add-btn" class="add-btn" aria-label="Add item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button id="camera-btn" class="camera-btn" aria-label="Scan handwritten list">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
    <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
  </div>

  <div id="list-container" class="list-container"></div>

  <div id="ocr-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Scan List</h2>
        <button id="modal-close-btn" class="modal-close" aria-label="Close">&times;</button>
      </div>

      <div id="ocr-processing" class="ocr-step hidden">
        <img id="ocr-preview" class="ocr-preview" alt="Captured photo">
        <div class="ocr-progress">
          <div class="spinner"></div>
          <p>Reading your list...</p>
          <div class="progress-bar"><div id="ocr-progress-fill" class="progress-fill"></div></div>
          <p id="ocr-progress-text">0%</p>
        </div>
      </div>

      <div id="ocr-results" class="ocr-step hidden">
        <p class="ocr-results-hint">Tap to edit, swipe to remove. Add items below.</p>
        <div id="ocr-items-list" class="ocr-items-list"></div>
        <div class="ocr-add-row">
          <input type="text" id="ocr-add-input" placeholder="Add missed item..." autocomplete="off">
          <button id="ocr-add-btn" class="add-btn" aria-label="Add item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="ocr-actions">
          <button id="ocr-cancel-btn" class="btn btn-secondary">Cancel</button>
          <button id="ocr-confirm-btn" class="btn btn-primary">Add All</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
